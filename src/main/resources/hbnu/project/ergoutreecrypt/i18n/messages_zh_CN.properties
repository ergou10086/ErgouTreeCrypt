# 选项提示
options.paranoid.tip=启用后数据先经 Serpent 加密再经 XChaCha20 加密，提供双重保护。加解密速度会略有下降。
options.reedSolomon.tip=使用 Reed-Solomon 纠错码，可在文件部分损坏时恢复数据。启用后文件体积增加约 6%。
options.deniability.tip=创建包含两份内容的加密容器：真密码解密真实文件，伪密码（钓鱼密码）解密无害的伪装文件。即使被胁迫，也可安全交出伪密码。
options.compress.tip=加密前先使用 Zstandard 压缩数据，可减小文件体积。
options.split.tip=将加密输出切分为多个指定大小的分卷文件，便于传输和存储。
options.encryptDepth=加密深度
options.encryptDepth.tip=控制文件夹迭代加密的层数。深度内的文件逐一加密为 .ergou；超出深度的子目录会先整体打包为 ZIP 压缩包，再对该压缩包进行加密（内部文件不再逐一加密）。默认值为 2，表示加密根目录和一级子目录内的所有文件。
options.forceDecrypt.tip=即使检测到数据损坏也强制解密，尽可能恢复未损坏部分的数据。
options.autoUnzip.tip=解密完成后自动解压 ZIP 归档，恢复原始文件结构。
options.verifyFirst.tip=解密前先校验文件完整性，确认数据未被篡改后再进行解密。
options.recursiveExtract.tip=默认仅解压最外层一层压缩包并解密其中内容；开启后会递归深入解压解密内部的嵌套压缩包。递归解压存在压缩炸弹等风险，请仅在确知内容安全时开启。
options.keyfiles.ordered.tip=要求按添加时的顺序提供密钥文件，顺序错误将导致解密失败。
