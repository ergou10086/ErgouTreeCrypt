about.text=ErgouTreeCrypt 是 Picocrypt-NG 的 Java 增强迁移实现，主要集中音视频文件领域。\n核心：Argon2id + XChaCha20 + Serpent + Reed-Solomon。\n可解密既有 .pcv，新文件采用 .ergou 格式。
about.version=版本 1.7.1

