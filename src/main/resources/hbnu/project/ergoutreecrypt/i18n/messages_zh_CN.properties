options.compressAfter.tip.nocustom=加密完成后将输出文件打包为指定归档格式。ZIP 使用原生 AES-256 加密（兼容 7-Zip / Bandizip / Windows 资源管理器等），可在下方填写归档密码。GZ / TAR.GZ / 7Z 当前不支持密码（如需为其加密，请在设置中开启「为非 zip 格式开启工具特有压缩包加密方式」），始终生成明文归档。
