settings.title=Settings
settings.section.theme=Appearance
settings.section.decrypt=Decryption
settings.section.encrypt=Encryption Defaults
settings.section.behavior=Behavior
settings.autoDecompress=Auto decompress-decrypt
settings.autoDecompress.tip=When the input is an archive, automatically extract and decrypt contained .ergou/.pcv files. Enabled by default.
settings.confirmOverwrite=Confirm before overwriting
settings.confirmOverwrite.tip=Show a confirmation dialog if the output file already exists, preventing accidental loss of important data.
settings.defaultPasswordless=Default passwordless mode
settings.defaultPasswordless.tip=Use passwordless mode by default for new encryption tasks (encrypts with a built-in public password), ideal for quick operations without security requirements.
settings.defaultParanoid=Default paranoid mode
settings.defaultParanoid.tip=Enable Serpent+XChaCha20 double encryption by default for new tasks.
settings.defaultReedSolomon=Default Reed-Solomon
settings.defaultReedSolomon.tip=Enable Reed-Solomon error correction by default (~6% size increase, corruption resistant).
settings.defaultFormat=Default format:
settings.defaultFormat.tip=The default archive format used by the "Compress after encrypt" feature.
settings.defaultSplitSize=Default split size:
settings.defaultSplitSize.tip=Default volume size (MiB) when splitting is enabled. Can be adjusted per operation.
settings.rememberOutputDir=Remember last output directory
settings.rememberOutputDir.tip=When browsing for an output path, start from the last used directory instead of the input file location.
settings.autoClearPassword=Auto-clear password after encrypt
settings.autoClearPassword.tip=Automatically clear the password field after encryption completes, preventing on-screen password residue.
settings.archiveCustomEncryption=Enable this tool's custom archive encryption for non-zip formats
settings.archiveCustomEncryption.tip=When enabled, GZ / TAR.GZ / 7Z can be password-protected using this tool's whole-archive AES-256 wrap (decryptable only by this tool; external tools cannot recognize the password). When disabled (default), these three formats do not support passwords and always produce plain archives. ZIP always uses native AES and is unaffected by this switch.
settings.archivePasswordFallback=Use encryption password when archive password is empty
settings.archivePasswordFallback.tip=When enabled: if the archive password is left empty after encrypt-and-compress, the file encryption password protects the archive. Always applies to ZIP; applies to GZ / TAR.GZ / 7Z only when "custom archive encryption" is also enabled. When disabled (default): an empty archive password produces a plain unencrypted archive.
settings.threadCount=Encryption threads:
settings.threadCount.tip=Number of threads to process multiple files concurrently (1-16). Default is 4. Higher values speed up folder encryption/decryption but use more CPU and memory.

