options.compressAfter.tip=加密完成后将输出文件打包为指定归档格式。ZIP 和 7Z 使用原生 AES-256 容器加密（兼容 Bandizip / 7-Zip）。GZ 和 TAR.GZ 不支持原生加密，将以自定义 AES-256-CTR 整体包裹（MAGIC 头），此类归档必须使用本工具解密。不填写密码则创建无加密的普通归档。
