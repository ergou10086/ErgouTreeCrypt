# 算法名称与描述
cc.caesar.name=凯撒密码（Caesar）
cc.caesar.desc=替换密码，将每个字符的 Unicode 码点按固定偏移量位移。支持所有语言文字。
cc.atbash.name=埃特巴什码（Atbash）
cc.atbash.desc=替换密码，将字符映射到 Unicode 码点空间的对称位置。自反操作——加密解密相同。
cc.rot13.name=ROT13
cc.rot13.desc=凯撒密码的特例，固定位移 13。自反操作——执行两次还原原文。
cc.vigenere.name=维吉尼亚密码（Vigenère）
cc.vigenere.desc=多表替换密码，使用关键词中每个字符的码点作为位移量，抵抗简单频率分析。
cc.autokey.name=自动密钥密码（Autokey）
cc.autokey.desc=维吉尼亚变体，密钥由初始关键词拼接明文自身构成，消除关键词周期性规律。
cc.beaufort.name=博福特密码（Beaufort）
cc.beaufort.desc=自反多表替换密码，加密与解密为同一操作——执行两次还原原文。
cc.railfence.name=栅栏密码（Rail Fence）
cc.railfence.desc=换位密码，将文本以锯齿形写入 N 行栅栏，再逐行读取得到密文。与字符语言无关。
cc.coltrans.name=列移位密码（Columnar Transposition）
cc.coltrans.desc=换位密码，按行写入矩阵后按关键词排序的列顺序读出。与字符语言无关。
cc.xor.name=异或密码（XOR）
cc.xor.desc=字节级密码，将 UTF-8 字节与密钥逐字节异或。密文以 Base64 编码便于阅读。
cc.reverse.name=反转（Reverse）
cc.reverse.desc=简单将字符序列反转。自反操作——反转两次还原原文。

