about.text=ErgouTreeCrypt is a Java-enhanced migration implementation of Picocrypt-NG, mainly focused on audio and video file applications. \nCore: Argon2id + XChaCha20 + Serpent + Reed-Solomon.\nDecrypts existing .pcv; new files use the .ergou format.
about.version=Version 1.8.0

