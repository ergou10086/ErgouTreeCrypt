settings.confirmOverwrite.tip=若输出文件已存在，弹出确认对话框，避免误覆盖重要文件。
settings.defaultPasswordless=默认无密码模式
settings.defaultPasswordless.tip=新建加密任务时默认不要求密码（使用内置公开密码加密），适合无保密需求的快速操作。
settings.defaultParanoid=默认偏执模式
settings.defaultParanoid.tip=新建加密任务时默认开启 Serpent+XChaCha20 双重加密。
settings.defaultReedSolomon=默认纠错码
