# Option tooltips
options.paranoid.tip=Data is encrypted with Serpent first, then XChaCha20, providing dual-layer protection. Slightly slower.
options.reedSolomon.tip=Uses Reed-Solomon error correction to recover data from partial corruption. Adds ~6% file size overhead.
options.deniability.tip=Creates a container with two layers: the real password reveals sensitive content, the decoy (fake) password reveals harmless bait content. Safe to surrender the decoy password under coercion.
options.compress.tip=Compresses data with Zstandard before encryption, reducing file size.
options.split.tip=Splits the encrypted output into multiple volumes of the specified size for easier transfer and storage.
options.encryptDepth=Encrypt Depth
options.encryptDepth.tip=Controls the depth of iterative folder encryption. Files within the depth are encrypted individually to .ergou; subdirectories beyond the depth are first packed as a ZIP archive, then the archive itself is encrypted (internal files are not individually encrypted). Default is 2, meaning encrypt all files in the root folder and its immediate subdirectories.
options.forceDecrypt.tip=Forces decryption even when corruption is detected, recovering as much intact data as possible.
options.autoUnzip.tip=Automatically extracts the ZIP archive after decryption, restoring the original file structure.
options.verifyFirst.tip=Verifies file integrity before decryption, ensuring data has not been tampered with.
options.recursiveExtract.tip=By default only the outermost archive layer is extracted and its contents decrypted; enabling this recursively extracts and decrypts nested archives. Recursive extraction risks zip bombs, so enable only when the content is trusted.
options.keyfiles.ordered.tip=Requires keyfiles to be provided in the exact order they were added. Wrong order will cause decryption failure.
# Decrypt-only
options.forceDecrypt=Force decrypt (ignore corruption)
options.autoUnzip=Decryption after unzip
options.verifyFirst=Verify integrity first
options.recursiveExtract=Recursively extract nested archives

