settings.autoDecompress=Auto decompress-decrypt
settings.autoDecompress.tip=When the input is an archive, automatically extract and decrypt contained .ergou/.pcv files. Enabled by default.
settings.confirmOverwrite=Confirm before overwriting
settings.confirmOverwrite.tip=Show a confirmation dialog if the output file already exists, preventing accidental loss of important data.
settings.defaultPasswordless=Default passwordless mode
settings.defaultPasswordless.tip=Use passwordless mode by default for new encryption tasks (encrypts with a built-in public password), ideal for quick operations without security requirements.
settings.defaultParanoid=Default paranoid mode
settings.defaultParanoid.tip=Enable Serpent+XChaCha20 double encryption by default for new tasks.
settings.defaultReedSolomon=Default Reed-Solomon
settings.defaultReedSolomon.tip=Enable Reed-Solomon error correction by default (~6% size increase, corruption resistant).
settings.defaultFormat=Default format:
