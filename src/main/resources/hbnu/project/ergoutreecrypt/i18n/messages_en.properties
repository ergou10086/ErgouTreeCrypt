# Profiles
av.profile.label=Encryption Profile
av.profile.tip=Select encryption strategy: Auto picks the best profile per format; WAV Full covers all sample data; WAV Selective protects key regions only for speed; MP3 Frame-body encrypts audio while keeping frame headers; MP3 Main Data for better compatibility; MP4 mdat encrypts the largest data chunk.
av.profile.auto=Auto (recommended secure profile per format)
av.profile.wFull=Full encryption (secure)
av.profile.wSel=Selective encryption (fast / preview)
av.profile.mBody=Frame-body encryption (secure)
av.profile.mSafe=Main data only (better compatibility)
av.profile.vMdat=mdat encryption (secure)
# Options
av.option.integrity=Store integrity check
av.option.integrity.tip=Appends an integrity checksum to encrypted data, allowing verification of lossless restoration upon decryption. Recommended for security-critical use.
av.option.noiseDecrypt=Noise-file decryption
av.option.noiseDecrypt.tip=When enabled, first verifies the file carries this tool's encryption metadata (EGTC-AVE magic) before decrypting, preventing accidental processing of plain media as ciphertext. Enable when unsure of file origin. When disabled, decrypts directly by file extension.
av.option.noiseDecrypt.hint=Enable for files from unknown sources
