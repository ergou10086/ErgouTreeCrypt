# ===== Classical Cipher Tab =====
tab.classical=Classical Cipher

# Algorithm names & descriptions
cc.caesar.name=Caesar Cipher
cc.caesar.desc=A substitution cipher that shifts each character's Unicode code point by a fixed offset. Supports all languages.
cc.atbash.name=Atbash Cipher
cc.atbash.desc=A substitution cipher that maps each character to its symmetric position in the Unicode code point space. Self-inverse.
cc.rot13.name=ROT13
cc.rot13.desc=A special case of Caesar cipher with a fixed shift of 13. Self-inverse — applying twice restores the original.
cc.vigenere.name=Vigenère Cipher
cc.vigenere.desc=A polyalphabetic substitution cipher using a keyword to determine per-character shifts. Resists simple frequency analysis.
cc.autokey.name=Autokey Cipher
cc.autokey.desc=A Vigenère variant where the key is the keyword followed by the plaintext itself, eliminating keyword periodicity.
cc.beaufort.name=Beaufort Cipher
cc.beaufort.desc=A self-inverse polyalphabetic cipher. The same operation encrypts and decrypts — apply twice to restore the original.
cc.railfence.name=Rail Fence Cipher
cc.railfence.desc=A transposition cipher that writes text in a zigzag pattern across N rails, then reads row by row. Character-agnostic.
cc.coltrans.name=Columnar Transposition
cc.coltrans.desc=A transposition cipher that writes text in rows then reads columns in keyword-sorted order. Character-agnostic.
cc.xor.name=XOR Cipher
cc.xor.desc=A byte-level cipher that XORs UTF-8 bytes with a key. Ciphertext is Base64-encoded for readability.
cc.reverse.name=Reverse
cc.reverse.desc=Simply reverses the character sequence. Self-inverse — reversing twice restores the original.

