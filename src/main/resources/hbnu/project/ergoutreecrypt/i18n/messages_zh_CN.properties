settings.rememberOutputDir=记住上次输出目录
settings.rememberOutputDir.tip=浏览选择输出路径后，下次浏览时自动定位到上次使用的目录。
settings.autoClearPassword=加密后自动清除密码
settings.autoClearPassword.tip=加密任务完成后自动清空密码框，避免密码残留被旁人看到。
settings.archiveCustomEncryption=为非 zip 格式开启工具特有压缩包加密方式
settings.archiveCustomEncryption.tip=开启后，GZ / TAR.GZ / 7Z 可设置密码，采用本工具特有的整体 AES-256 包裹加密（仅能用本工具解密，外部工具无法识别密码）。关闭（默认）时，这三种格式不支持密码，始终生成明文压缩包。ZIP 始终使用原生 AES，不受此开关影响。
settings.archivePasswordFallback=压缩包密码留空则使用加密密码
settings.archivePasswordFallback.tip=开启后：加密后压缩时若未填写归档密码，将自动使用文件加密密码保护压缩包。对 ZIP 始终生效；对 GZ / TAR.GZ / 7Z 仅在同时开启「工具特有压缩包加密方式」时才生效。关闭后（默认）：归档密码留空则生成无密码明文压缩包。
settings.threadCount=并行线程数：
settings.threadCount.tip=同时处理多个文件的线程数量（1-16）。默认4，更高的线程数可加速文件夹加解密，但会占用更多CPU和内存。

